server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  graceful_shutdown_timeout: 30s
  # 보안 한계값: slowloris 방어용 헤더 읽기 타임아웃(기본 5s)
  read_header_timeout: 5s
  # 보안 한계값: 헤더 폭탄 방어용 최대 헤더 바이트(기본 1 MiB = 1048576)
  max_header_bytes: 1048576

worker_pool:
  size: 100
  queue_size: 10000

rate_limiter:
  enabled: true
  requests_per_second: 1000
  burst: 2000

circuit_breaker:
  enabled: true
  max_requests: 100
  interval: 60s
  timeout: 30s

metrics:
  enabled: true
  path: "/metrics"

log:
  level: "info"
  format: "json"
