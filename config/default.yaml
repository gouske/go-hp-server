server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  graceful_shutdown_timeout: 30s

worker_pool:
  size: 100
  queue_size: 10000

rate_limiter:
  enabled: true
  requests_per_second: 1000
  burst: 2000

circuit_breaker:
  enabled: true
  max_requests: 100
  interval: 60s
  timeout: 30s

metrics:
  enabled: true
  path: "/metrics"

log:
  level: "info"
  format: "json"
